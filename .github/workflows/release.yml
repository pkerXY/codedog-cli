name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: dog-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: dog-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: dog-macos-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact }} dog

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target\${{ matrix.target }}\release
          7z a ../../../${{ matrix.artifact }} dog.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## CodeDog ${{ steps.get_version.outputs.VERSION }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Linux (x86_64) | `dog-linux-x86_64.tar.gz` |
            | Windows (x86_64) | `dog-windows-x86_64.zip` |
            | macOS (x86_64) | `dog-macos-x86_64.tar.gz` |

            ### 安装

            **Linux/macOS:**
            ```bash
            tar -xzf dog-linux-x86_64.tar.gz
            sudo mv dog /usr/local/bin/
            ```

            **Windows:**
            解压 `dog-windows-x86_64.zip`，将 `dog.exe` 放入 PATH 目录。

            ### 使用

            ```bash
            dog --help
            dog format data.json
            dog time now
            dog tui
            ```
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.zip
          draft: false
          prerelease: false
